pipeline:
  lint:
    image: node:20-alpine
    commands:
      # Need git for pulling some package dependencies (erikap/sparql-client)
      - apk --no-cache add git openssh
      - npm ci
      - npm run lint:js
  build:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      platforms: linux/amd64,linux/arm64
      repo: ${CI_REPO}
      dry_run: true
when:
  event:
    - pull_request
